<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Local Sathi - Verify</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #e0e0e0;
    border-top: 4px solid #00897B;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h3 { color: #333; font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  p { color: #777; font-size: 13px; line-height: 1.5; }
  .status { color: #00897B; font-size: 12px; margin-top: 12px; font-weight: 500; }
  .error { color: #E53935; font-size: 13px; margin-top: 12px; }
  .recaptcha-wrap { display: inline-block; margin-top: 20px; }
  .check {
    width: 56px; height: 56px;
    background: #00897B;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: white;
    font-size: 28px;
  }
  #phase-loading, #phase-captcha, #phase-sending, #phase-done, #phase-error {
    display: none;
  }
  #phase-loading { display: block; }
</style>
</head>
<body>
  <div class="card">
    <!-- Phase 1: Loading reCAPTCHA -->
    <div id="phase-loading">
      <div class="spinner"></div>
      <h3>Preparing verification</h3>
      <p>Loading security check...</p>
      <div id="loading-status" class="status"></div>
    </div>

    <!-- Phase 2: Visible CAPTCHA (if invisible fails) -->
    <div id="phase-captcha">
      <h3>Quick Security Check</h3>
      <p>Complete the verification below to continue</p>
      <div class="recaptcha-wrap"><div id="visible-recaptcha"></div></div>
    </div>

    <!-- Phase 3: Sending OTP -->
    <div id="phase-sending">
      <div class="spinner"></div>
      <h3>Sending OTP</h3>
      <p>Please wait while we send the verification code...</p>
    </div>

    <!-- Phase 4: Done -->
    <div id="phase-done">
      <div class="check">&#10003;</div>
      <h3 style="color:#00897B;">OTP Sent!</h3>
      <p>Returning to app...</p>
    </div>

    <!-- Phase 5: Error -->
    <div id="phase-error">
      <div style="width:56px;height:56px;background:#E53935;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-size:28px;">!</div>
      <h3 style="color:#E53935;">Verification Failed</h3>
      <p id="error-message" class="error"></p>
    </div>
  </div>

  <!-- Invisible reCAPTCHA container -->
  <div id="invisible-recaptcha" style="position:absolute;left:-9999px;"></div>

  <script>
    // Parse phone number from URL
    var params = new URLSearchParams(window.location.search);
    var phoneNumber = params.get('phone') || '';
    var mode = params.get('mode') || 'recaptcha'; // recaptcha or firebase
    var apiKey = params.get('key') || 'AIzaSyDNOCIYHqUr-D3qX0Hk5on8dykkvrhB5tY';
    var siteKey = '6LcMZR0UAAAAALgPMcgHwga7gY5p8QMg1Hj-bmUv';
    var tokenSent = false;

    function showPhase(id) {
      ['phase-loading','phase-captcha','phase-sending','phase-done','phase-error'].forEach(function(p) {
        document.getElementById(p).style.display = (p === id) ? 'block' : 'none';
      });
    }

    function setStatus(msg) {
      var el = document.getElementById('loading-status');
      if (el) el.textContent = msg;
      sendToFlutter('STATUS:' + msg);
    }

    function sendToFlutter(msg) {
      try {
        if (window.FlutterChannel) {
          FlutterChannel.postMessage(msg);
        }
      } catch(e) {}
    }

    function showError(msg) {
      showPhase('phase-error');
      document.getElementById('error-message').textContent = msg;
      sendToFlutter('ERROR:' + msg);
    }

    // Called when reCAPTCHA token is obtained
    function onToken(token) {
      if (tokenSent) return;
      tokenSent = true;
      showPhase('phase-sending');
      sendOTP(token);
    }

    // Send OTP via REST API
    function sendOTP(recaptchaToken) {
      var url = 'https://identitytoolkit.googleapis.com/v1/accounts:sendVerificationCode?key=' + apiKey;
      fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          phoneNumber: phoneNumber,
          recaptchaToken: recaptchaToken
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.sessionInfo) {
          showPhase('phase-done');
          sendToFlutter('SESSION:' + data.sessionInfo);
        } else {
          var errMsg = (data.error && data.error.message) || 'Unknown error';
          if (errMsg.indexOf('TOO_MANY') >= 0) errMsg = 'Too many attempts. Please wait before trying again.';
          else if (errMsg.indexOf('INVALID_PHONE') >= 0) errMsg = 'Invalid phone number.';
          else if (errMsg.indexOf('CAPTCHA_CHECK_FAILED') >= 0) errMsg = 'Security check failed. Please try again.';
          else if (errMsg.indexOf('QUOTA') >= 0) errMsg = 'SMS quota exceeded. Try again later.';
          showError(errMsg);
        }
      })
      .catch(function(err) {
        showError('Network error: ' + err.message);
      });
    }

    // Load reCAPTCHA
    var invisibleWidget = null;
    var visibleRendered = false;

    function onRecaptchaLoad() {
      setStatus('Security check loaded');

      // Try invisible reCAPTCHA first
      try {
        invisibleWidget = grecaptcha.render('invisible-recaptcha', {
          sitekey: siteKey,
          callback: onToken,
          'error-callback': function() { showVisibleMode(); },
          'expired-callback': function() { showVisibleMode(); },
          size: 'invisible'
        });
        setStatus('Running automatic verification...');
        grecaptcha.execute(invisibleWidget);
      } catch(e) {
        setStatus('Switching to manual verification...');
        showVisibleMode();
      }

      // Timeout: if invisible doesn't resolve in 5 seconds, show visible
      setTimeout(function() {
        if (!tokenSent) {
          setStatus('Manual verification required');
          showVisibleMode();
        }
      }, 5000);
    }

    function showVisibleMode() {
      if (tokenSent || visibleRendered) return;
      visibleRendered = true;
      showPhase('phase-captcha');

      try {
        if (invisibleWidget !== null) {
          try { grecaptcha.reset(invisibleWidget); } catch(e) {}
        }
        grecaptcha.render('visible-recaptcha', {
          sitekey: siteKey,
          callback: onToken,
          theme: 'light',
          size: 'normal'
        });
      } catch(e) {
        showError('Could not load security check: ' + e.message);
      }
    }

    // Notify Flutter that page is loaded
    sendToFlutter('PAGE_LOADED');
    setStatus('Loading security module...');
  </script>
  <script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>
</body>
</html>
