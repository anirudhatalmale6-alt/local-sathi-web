name: local_sathi
description: "Local Sathi - Your Community Companion. Find verified service providers in your neighbourhood."
publish_to: 'none'
version: 2.0.0+28

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Image Picker (for Aadhaar upload & profile photo)
  image_picker: ^1.1.2

  # Cached Network Image
  cached_network_image: ^3.4.1

  # Icons
  flutter_svg: ^2.0.17

  # Shimmer Loading
  shimmer: ^3.0.0

  # Intl (for date formatting)
  intl: ^0.19.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Google Mobile Ads
  google_mobile_ads: ^5.3.0

  # App Version Info
  package_info_plus: ^8.2.1

  # Auto OTP Reading
  sms_autofill: ^2.4.0

  # Share
  share_plus: ^10.1.4

  # In-app download
  dio: ^5.7.0
  path_provider: ^2.1.5
  open_filex: ^4.5.0

  # Animations
  flutter_animate: ^4.5.2

  # AI - Google Gemini
  google_generative_ai: ^0.4.6

  # Voice - Speech to Text
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
